<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#202124">
  <title>GSRE Interview Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Text:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="quiz/css/quiz.css?v=509-1">
</head>
<body class="dark">
  <header>
    <div class="header-top">
      <div>
        <h1>Google SRE SWE Interview Prep</h1>
        <p class="subtitle">Systems Architecture &amp; Googleyness / Leadership</p>
      </div>
      <div id="score-bar" class="score-bar">
        <span class="score-label">Average score</span>
        <span id="avg-score" class="avg-score">—</span>
        <span id="score-detail" class="score-detail">No questions answered yet</span>
        <span id="pool-remaining" class="pool-remaining">—</span>
      </div>
    </div>
  </header>

  <main>
    <section id="quiz-area" class="quiz-area">
      <p id="quiz-meta" class="meta"></p>
      <div id="question-text" class="question"></div>
      <div id="options" class="options"></div>
      <div id="video-link" class="video-link"></div>
      <div id="explanation" class="explanation hidden"></div>
      <button id="next-btn" class="btn-primary hidden">Next question</button>
    </section>

    <section id="module-filters" class="module-filters">
      <h2>In scope</h2>
      <p class="hint">Untick sections to exclude them from the random question pool.</p>
      <div id="module-chips" class="module-chips"></div>
    </section>

    <section id="section-stats" class="section-stats">
      <div class="section-stats-header">
        <h2>Performance by section</h2>
        <button id="reset-progress-btn" type="button" class="btn-secondary">Reset progress</button>
      </div>
      <div id="stats-grid" class="stats-grid"></div>
    </section>
  </main>

  <script id="quiz-loader" src="quiz/js/loader.js?v=509-1"></script>
  <script src="quiz/js/storage.js?v=509-1"></script>
  <script src="quiz/js/engine.js?v=509-1"></script>
  <script src="quiz/js/format.js?v=509-1"></script>
  <script src="quiz/js/ui.js?v=509-1"></script>
  <script src="quiz/js/app.js?v=509-1"></script>
</body>
</html>
