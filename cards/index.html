<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#202124">
  <title>GSRE Flash Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Text:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../quiz/css/quiz.css?v=cards-5">
  <link rel="stylesheet" href="../quiz/css/cards.css?v=cards-5">
</head>
<body class="dark cards-page">
  <header>
    <div class="header-top">
      <div>
        <h1>GSRE Flash Cards</h1>
        <p class="resource-links">
          <a href="../">Study quiz</a>
          <span aria-hidden="true"> · </span>
          <a href="../cheat-sheet.html" target="_blank" rel="noopener">Cheat sheet</a>
          <span aria-hidden="true"> · </span>
          <button id="face-mode-btn" type="button" class="linkish-btn">Show question first</button>
        </p>
      </div>
      <div class="cards-score-bar" id="cards-score-bar">
        <span id="cards-remaining" class="cards-remaining-num">—</span>
        <span class="score-label">remaining</span>
        <span id="cards-detail" class="score-detail">Loading…</span>
      </div>
    </div>
  </header>

  <main>
    <section id="cards-area" class="cards-area">
      <p id="cards-meta" class="meta"></p>
      <button id="flash-card" type="button" class="flash-card" aria-label="Flip card">
        <div class="flash-card-inner" id="flash-card-inner">
          <div class="flash-face flash-face-front">
            <span class="face-label" id="prompt-label">Question</span>
            <div class="face-text" id="prompt-text"></div>
          </div>
          <div class="flash-face flash-face-back">
            <span class="face-label" id="reveal-label">Answer</span>
            <div class="face-text" id="reveal-text"></div>
            <p class="face-source" id="reveal-source"></p>
          </div>
        </div>
      </button>
      <p id="flip-hint" class="flip-hint">Tap the card to flip</p>
    </section>

    <section id="cards-done" class="cards-done hidden">
      <h2>All cards at very confident</h2>
      <p class="hint">Nice work. Reset progress to shuffle the deck and start again.</p>
      <button id="done-reset-btn" type="button" class="btn-primary">Reset and reshuffle</button>
    </section>
  </main>

  <footer class="rating-bar" id="rating-bar">
    <p class="rating-label">How confident are you?</p>
    <div class="rating-buttons">
      <button type="button" class="rating-btn rating-1" data-rating="1" disabled>
        <span class="rating-num">1</span>
        <span class="rating-text">Not at all</span>
      </button>
      <button type="button" class="rating-btn rating-2" data-rating="2" disabled>
        <span class="rating-num">2</span>
        <span class="rating-text">Not confident</span>
      </button>
      <button type="button" class="rating-btn rating-3" data-rating="3" disabled>
        <span class="rating-num">3</span>
        <span class="rating-text">Confident</span>
      </button>
      <button type="button" class="rating-btn rating-4" data-rating="4" disabled>
        <span class="rating-num">4</span>
        <span class="rating-text">Very confident</span>
      </button>
    </div>
    <div class="rating-footer-actions">
      <button id="reset-cards-btn" type="button" class="btn-secondary">Reset progress</button>
    </div>
  </footer>

  <script id="cards-loader" src="../quiz/js/cards-loader.js?v=cards-5"></script>
  <script src="../quiz/js/format.js?v=cards-5"></script>
  <script src="../quiz/js/cards-storage.js?v=cards-5"></script>
  <script src="../quiz/js/cards-engine.js?v=cards-5"></script>
  <script src="../quiz/js/cards-ui.js?v=cards-5"></script>
  <script src="../quiz/js/cards-app.js?v=cards-5"></script>
</body>
</html>
